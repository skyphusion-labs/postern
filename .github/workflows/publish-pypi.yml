name: Publish PyPI package

# Publish postern-client when a v* tag is pushed (same tag as deploy.yml and
# release.yml). Do not trigger on release: published: releases created by
# softprops/action-gh-release with GITHUB_TOKEN do not fire that webhook.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Assert tag is on main (no publish of an unreviewed release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on origin/main; refusing to publish an unreviewed release"
            exit 1
          fi

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Verify package version matches release tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: clients/python
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag v$tag does not match pyproject.toml version $pkg" >&2
            exit 1
          fi

      - name: Build sdist and wheel
        working-directory: clients/python
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

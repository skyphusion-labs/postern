name: npm-mcp

# Publish @skyphusion/postern-mcp to the public npm registry.
# Tag push: git tag postern-mcp-v1.1.1 && git push origin postern-mcp-v1.1.1
# Or: workflow_dispatch (uses version in mcp/package.json).
#
# Required repo secret: NPM_TOKEN (npmjs.com automation token with publish scope
# for the @skyphusion org).

on:
  push:
    tags:
      - "postern-mcp-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: npm publish @skyphusion/postern-mcp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert commit is on main (no publish of an unreviewed release)
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::commit $GITHUB_SHA is not on origin/main; refusing to publish an unreviewed release"
            exit 1
          fi

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck && npm test && npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

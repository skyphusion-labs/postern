name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job here only checks out, typechecks, builds, and tests,
# so the GITHUB_TOKEN needs nothing beyond reading the repo. Pinned at the top
# level so all jobs inherit it (CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:

  inbound:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inbound
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: inbound/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  relay:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          # Track the relay go.mod toolchain so CI never drifts from the code.
          go-version-file: relay/go.mod
          cache-dependency-path: relay/go.sum
      - run: go vet ./...
      - run: go build ./...
      # Run the unit suite (incl. the email-injection regression guards) under
      # the race detector. Without this, those tests never execute in CI and the
      # regression guard for the go/email-injection fix would be decorative.
      - run: go test -race ./...
      # Vulnerability gate (audit #107): scan the relay module + its dependency
      # graph against the Go vulnerability database before public exposure. The tool
      # version is pinned for reproducible CI; its advisory DB is fetched fresh at
      # run time, so the gate stays current without a tool bump.
      - name: govulncheck (dependency vulnerability gate)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          "$(go env GOPATH)/bin/govulncheck" ./...

  imap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: imap
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      # Twisted is the only runtime dep; mypy is the type gate (mirrors the
      # Node typecheck convention). The pure layers test without Twisted, but
      # the e2e server test needs it, so install the package + dev extras. We also
      # install the [tls] extra (pyOpenSSL / service-identity, the 993 IMAPS TLS
      # stack, audit #107) so it resolves in CI and is covered by the scan below.
      - run: pip install -e '.[dev,tls]'
      - run: python -m mypy
      - run: python -m twisted.trial posternimap.tests
      # Vulnerability gate (audit #107): audit the installed environment, which now
      # includes Twisted[tls] and its transitive TLS deps. Upgrade pip first so the
      # gate scans our SHIPPED deps, not stale advisories in the runner's bundled
      # pip toolchain; --skip-editable skips the local posternimap package (no PyPI
      # version). pip-audit is pinned for reproducibility.
      - name: pip-audit (dependency vulnerability gate)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.10.1
          pip-audit --skip-editable

  clients-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      # Zero runtime deps (pure stdlib urllib); install the package + dev extras so
      # mypy (the type gate, mirrors the Node typecheck) is available. Tests are
      # stdlib unittest, no extra deps. Public repo -> GitHub-hosted, fork-safe.
      - run: pip install -e '.[dev]'
      - run: python -m mypy
      - run: python -m unittest discover
      # Vulnerability gate (audit #107): the client is pure stdlib, so this audits
      # the dev toolchain; kept for parity so every shippable Python surface has the
      # same pre-exposure scan. Upgrade pip first (avoid stale-toolchain noise);
      # --skip-editable skips the local postern-client package. pip-audit pinned.
      - name: pip-audit (dependency vulnerability gate)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.10.1
          pip-audit --skip-editable

  mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Webmail v2 phase 6 (#355): Playwright critical journeys (mocked /api).
  webmail-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webmail/e2e
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webmail/e2e/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test

  ci:
    name: ci
    needs: [inbound, relay, imap, clients-python, mcp, webmail-e2e]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all component jobs
        run: |
          test "${{ needs.inbound.result }}" = "success"
          test "${{ needs.relay.result }}" = "success"
          test "${{ needs.imap.result }}" = "success"
          test "${{ needs.clients-python.result }}" = "success"
          test "${{ needs.mcp.result }}" = "success"
          test "${{ needs.webmail-e2e.result }}" = "success"

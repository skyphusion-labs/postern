name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job here only checks out, typechecks, builds, and tests,
# so the GITHUB_TOKEN needs nothing beyond reading the repo. Pinned at the top
# level so all jobs inherit it (CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  inbound:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inbound
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: inbound/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  relay:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: relay/go.sum
      - run: go vet ./...
      - run: go build ./...
      # Run the unit suite (incl. the email-injection regression guards) under
      # the race detector. Without this, those tests never execute in CI and the
      # regression guard for the go/email-injection fix would be decorative.
      - run: go test -race ./...

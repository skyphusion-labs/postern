name: coverage

# Produces real, inspectable coverage for all three components and uploads it as
# build artifacts. The previous version used actions/upload-code-coverage@v1 and a
# code-quality:write permission, both GitHub Enterprise only; on github.com those
# steps were green no-ops, so "coverage" reflected nothing. This runs the real
# suites and keeps the reports as downloadable artifacts instead.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ---- Relay (Go) ----
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: relay/go.mod
          cache-dependency-path: relay/go.sum

      - name: Relay coverage
        working-directory: relay
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

      # ---- Node (worker + inbound) ----
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            worker/package-lock.json
            inbound/package-lock.json

      - name: Worker coverage
        working-directory: worker
        run: |
          npm ci
          npm run test:coverage

      - name: Inbound coverage
        working-directory: inbound
        run: |
          npm ci
          npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            relay/coverage.out
            worker/coverage/
            inbound/coverage/
          if-no-files-found: warn
          retention-days: 14

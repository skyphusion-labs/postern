name: imap-image

# Build the postern-imap door image and push it to GHCR.
#
# WHY: the 993 IMAP door is moving off the host systemd+venv install onto a
# versioned container image (CI -> GHCR -> Swarm). The image is the unit of
# deploy; the Swarm stack pins it by the immutable git short-SHA tag this
# workflow produces, so `docker service update --image ...:<sha>` is exact.
#
# After a green push, dispatches fleet-chezmoi `postern-door-roll` to pin the image on
# biafra and redeploy `postern-imap` (requires org secret FLEET_DISPATCH_TOKEN).
#
# Triggers:
#   - push to main that touches imap/** (or this workflow): rebuild on real changes,
#     not on every unrelated main push.
#   - a v* tag: cut a release-tagged image.
#   - workflow_dispatch: a reliable manual build (also the dependable path for a
#     release tag whose commit did not itself change imap/**, since GitHub ANDs the
#     paths filter onto tag pushes).
#
# Runner: GitHub-hosted ubuntu-latest. PUBLIC repo -> fork-safe hosted runner, per
# the house CI policy (matches ci.yml / deploy.yml). The image is a slim Python base,
# so no disk-reclaim step is needed (that is only for the large CUDA images).
on:
  push:
    branches: [main]
    paths:
      - 'imap/**'
      - '.github/workflows/imap-image.yml'
    tags:
      - 'v*'
  workflow_dispatch: {}

# Least privilege: read the repo, write GHCR packages. Nothing else.
permissions:
  contents: read
  packages: write

# A newer push to the same ref supersedes an in-flight build.
concurrency:
  group: imap-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/skyphusion-labs/postern-imap

jobs:

  # Gate: the same checks ci.yml runs for imap (mypy type gate + Twisted trial
  # suite), so the image is only built from code that passes the project gate.
  # CI parity is the house convention (the tsc-equivalent must be green first).
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: imap
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Install the package with the SAME extras the runtime image ships
      # (.[tls,ldap]) plus dev (mypy), so the gate resolves exactly what we deploy.
      - run: pip install -e '.[dev,tls,ldap]'
      - run: python -m mypy
      - run: python -m twisted.trial posternimap.tests

  build:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Immutable git short-SHA (bare, the pin target for `service update
          # --image`), a moving `latest` on the default branch, and the v* tag
          # on a release.
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./imap
          file: ./imap/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The runtime target is x86_64; a single linux/amd64 image keeps the GHCR
          # package and the short-SHA digest clean for swarm pinning.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch-roll:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Dispatch postern-imap roll to fleet-chezmoi
        env:
          FLEET_DISPATCH_TOKEN: ${{ secrets.FLEET_DISPATCH_TOKEN }}
        run: bash .github/scripts/dispatch-fleet-postern-door-roll.sh imap skyphusion-labs/postern-imap

name: deploy

# Deploy step ported from the decommissioned Jenkins pipeline (the old
# `skyphusion-email` job): on a pushed version tag (v*), deploy the inbound
# Cloudflare Worker to production via `wrangler deploy`. A bare merge to main
# NEVER redeploys prod; cut a SemVer tag to ship
# (git tag -a vX.Y.Z && git push origin vX.Y.Z). workflow_dispatch is kept for a
# deliberate manual redeploy.
#
# PRs are gated by ci.yml (inbound/relay/imap checks). This workflow owns the
# release deploy, and re-runs the inbound typecheck/test inline so the deploy is
# gated behind green on the exact code being shipped. Branch/PR pushes never deploy.
#
# Worker deployed (name per inbound/wrangler.jsonc):
#   inbound/  -> postern        (CF Email Routing ingestion + store/read/send API;
#                                was skyphusion-email-inbound)
#
# The legacy send-only worker/ (postern-send) was folded into inbound/ (#190).
#
# Runner: GitHub-hosted ubuntu-latest. This is a PUBLIC repo, so deploy is gated
# to push-to-main (never a fork PR) and runs on the fork-safe hosted runner
# (matches ci.yml and the GitHub-hosted policy for public repos).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   -- CF API token, Workers Scripts:Edit on the account
#                             (plus D1 + Vectorize + R2 edit for the inbound store).
#   CLOUDFLARE_ACCOUNT_ID  -- the Cloudflare account ID.
#
# Optional operator override:
#   POSTERN_INBOUND_WRANGLER -- the full real inbound wrangler config (JSON) for
#                             YOUR instance: real D1 database_id, bindings, and
#                             vars. The committed inbound/wrangler.jsonc is a
#                             public template with placeholder ids, so CI uses
#                             this secret (kept out of the repo, masked in logs)
#                             when present, and falls back to the template when
#                             absent. Worker runtime secrets (e.g.
#                             POSTERN_API_TOKEN) are set once via `wrangler secret
#                             put` and persist across deploys -- not set here.
#
# D1 migrations: the inbound deploy runs `wrangler d1 migrations apply` before
# `wrangler deploy`, so a schema change ships with its code instead of drifting.
# wrangler tracks applied migrations in a d1_migrations table and only runs new
# ones, so this is idempotent. (Baselining an EXISTING pre-wrangler DB requires
# seeding d1_migrations once with the already-applied migration names.)
#
# Auto-apply is GATED (#112): before the apply, every PENDING migration is
# classified by .github/scripts/d1-migration-gate.mjs. Additive shapes (CREATE
# table/index/trigger, ALTER ... ADD COLUMN, INSERT ... VALUES seeds) apply with
# zero friction, as before. Destructive or unrecognized shapes (DROP, RENAME TO,
# DELETE/UPDATE data migrations, INSERT ... SELECT copy-rebuilds, FTS5 rebuilds)
# FAIL the deploy before anything touches the live store, unless the migration
# file carries an explicit reviewed "-- postern:allow-destructive" marker. The
# sanctioned path for a genuinely destructive migration is the manual offline
# runbook (backup -> quiesce -> apply -> verify) followed by baseline-seeding
# d1_migrations, so the pipeline sees it as already applied and no-ops.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-postern-tag
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy workers to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Inbound typecheck + test
        working-directory: inbound
        run: |
          npm ci
          npm run typecheck
          npm test

      # The committed inbound/wrangler.jsonc is the PUBLIC template (placeholder
      # ids, postern-named, vectorize/send commented out). An operator points CI
      # at their own instance via the POSTERN_INBOUND_WRANGLER secret (the full
      # real config); absent it, the committed template ships. We apply D1
      # migrations before deploying so schema and code ship together (idempotent;
      # the DB binding name `DB` resolves the database in either config), gated
      # so only recognizably additive migrations auto-apply (#112; see the header
      # comment and .github/scripts/d1-migration-gate.mjs).
      - name: Deploy inbound (migrate + deploy)
        working-directory: inbound
        env:
          POSTERN_INBOUND_WRANGLER: ${{ secrets.POSTERN_INBOUND_WRANGLER }}
        run: |
          if [ -n "$POSTERN_INBOUND_WRANGLER" ]; then
            printf "%s" "$POSTERN_INBOUND_WRANGLER" > wrangler.ci.json
            CFG=wrangler.ci.json
            echo "Using operator config (POSTERN_INBOUND_WRANGLER)"
          else
            CFG=wrangler.jsonc
            echo "No operator config secret set; using committed template"
          fi
          echo "Listing pending D1 migrations"
          npx wrangler d1 migrations list DB --remote -c "$CFG" > migrations.pending.txt
          cat migrations.pending.txt
          echo "Gating auto-apply: additive migrations only (#112)"
          node ../.github/scripts/d1-migration-gate.mjs migrations < migrations.pending.txt
          echo "Applying D1 migrations (only un-applied ones run)"
          npx wrangler d1 migrations apply DB --remote -c "$CFG"
          echo "Deploying inbound worker"
          npx wrangler deploy -c "$CFG"

      # Always remove the CI-materialized operator config, even when the deploy
      # step above failed partway: GitHub runs run: blocks under bash -e, so a
      # failed migrations-list / gate / apply / deploy exits before any trailing
      # rm. The file is derived from the POSTERN_INBOUND_WRANGLER secret, so its
      # teardown must be deterministic, never conditional on the happy path
      # (wrangler.ci.json is also gitignored, #296). (#298)
      - name: Clean up materialized config
        if: always()
        working-directory: inbound
        run: rm -f wrangler.ci.json migrations.pending.txt

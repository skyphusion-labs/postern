name: deploy

# Deploy step ported from the decommissioned Jenkins pipeline (the old
# `skyphusion-email` job): on a green push to main, deploy the two Cloudflare
# Workers to production via `wrangler deploy`.
#
# PRs are gated by ci.yml (worker/inbound/relay/imap checks). This workflow owns
# the main deploy, and re-runs the worker + inbound typecheck/test inline so the
# deploy is gated behind green on the exact code being shipped (faithful to the
# Jenkins "deploy only on green main"). Branch/PR pushes never deploy.
#
# Workers deployed (names per the post-rename wrangler.jsonc in each dir):
#   worker/   -> postern-send   (outbound sending; was skyphusion-email)
#   inbound/  -> postern        (CF Email Routing ingestion + store/read API;
#                                was skyphusion-email-inbound)
#
# Runner: GitHub-hosted ubuntu-latest. This is a PUBLIC repo, so deploy is gated
# to push-to-main (never a fork PR) and runs on the fork-safe hosted runner
# (matches ci.yml and the GitHub-hosted policy for public repos).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   -- CF API token, Workers Scripts:Edit on the account
#                             (plus D1 + Vectorize + R2 edit for the inbound store).
#   CLOUDFLARE_ACCOUNT_ID  -- the Cloudflare account ID.
#
# Optional operator override:
#   POSTERN_INBOUND_WRANGLER -- the full real inbound wrangler config (JSON) for
#                             YOUR instance: real D1 database_id, bindings, and
#                             vars. The committed inbound/wrangler.jsonc is a
#                             public template with placeholder ids, so CI uses
#                             this secret (kept out of the repo, masked in logs)
#                             when present, and falls back to the template when
#                             absent. Worker runtime secrets (e.g.
#                             POSTERN_API_TOKEN) are set once via `wrangler secret
#                             put` and persist across deploys -- not set here.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-postern-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy workers to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Gate: deploy only if worker + inbound are green on this exact commit.
      - name: Worker typecheck + test
        working-directory: worker
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Inbound typecheck + test
        working-directory: inbound
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Deploy worker (postern-send)
        working-directory: worker
        run: npx wrangler deploy

      # The committed inbound/wrangler.jsonc is the PUBLIC template (placeholder
      # ids, postern-named, vectorize/send commented out). An operator points CI
      # at their own instance via the POSTERN_INBOUND_WRANGLER secret (the full
      # real config), which we write to a runner-local file and deploy with -c.
      # Absent the secret, the committed template ships as-is.
      - name: Deploy inbound
        working-directory: inbound
        env:
          POSTERN_INBOUND_WRANGLER: ${{ secrets.POSTERN_INBOUND_WRANGLER }}
        run: |
          if [ -n "$POSTERN_INBOUND_WRANGLER" ]; then
            printf "%s" "$POSTERN_INBOUND_WRANGLER" > wrangler.ci.json
            echo "Deploying inbound with operator config (POSTERN_INBOUND_WRANGLER)"
            npx wrangler deploy -c wrangler.ci.json
            rm -f wrangler.ci.json
          else
            echo "No operator config secret set; deploying committed template"
            npx wrangler deploy
          fi

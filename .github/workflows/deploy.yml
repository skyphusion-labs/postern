name: Deploy (main only)

# Mirrors the Jenkinsfile Deploy stage: deploy both workers to production on
# push to main, gated behind the full CI suite (worker, inbound, relay, imap).
# Jenkins job (skyphusion-email) has never built -- this is the active deploy path.
#
# Workers deployed:
#   worker/   -> skyphusion-email          (outbound sending)
#   inbound/  -> skyphusion-email-inbound  (CF Email Routing ingestion)
#
# Required secrets (set on skyphusion-labs/skyphusion-email):
#   CLOUDFLARE_API_TOKEN   -- CF API token with Workers + D1 + Vectorize edit perms
#   CLOUDFLARE_ACCOUNT_ID  -- Cloudflare account ID

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:

  # Deploy both workers to Cloudflare. Gated on main push; secrets injected
  # per-step so wrangler never sees the token outside its own step.
  deploy:
    name: Deploy workers to Cloudflare
    runs-on: [self-hosted, fleet]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Deploy worker (skyphusion-email)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: worker
        run: |
          npm ci
          npx wrangler deploy

      - name: Deploy inbound (skyphusion-email-inbound)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: inbound
        run: |
          npm ci
          npx wrangler deploy

version: 2

# skyphusion-labs Dependabot standard — see fleet-chezmoi/docs/runbooks/dependabot-standard.md
# PRs only (never auto-merge). Group minor/patch; majors stay separate. Peer families bump together.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      vitest-toolchain:
        patterns:
          - "vitest"
          - "@vitest/*"
      mcp-runtime:
        patterns:
          - "@modelcontextprotocol/sdk"
          - "zod"
      npm-minor-patch:
        patterns: ["*"]
        exclude-patterns:
          - "vitest"
          - "@vitest/*"
          - "@modelcontextprotocol/sdk"
          - "zod"
        update-types: ["minor", "patch"]
  - package-ecosystem: npm
    directory: /inbound
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      cloudflare-toolchain:
        patterns:
          - "wrangler"
          - "@cloudflare/workers-types"
      vitest-toolchain:
        patterns:
          - "vitest"
          - "@vitest/*"
      npm-minor-patch:
        patterns: ["*"]
        exclude-patterns:
          - "wrangler"
          - "@cloudflare/workers-types"
          - "vitest"
          - "@vitest/*"
        update-types: ["minor", "patch"]
  - package-ecosystem: gomod
    directory: /relay
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      gomod-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: pip
    directory: "/clients/python"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      pip-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: pip
    directory: "/imap"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      pip-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: docker
    directories:
      - "/imap"
      - "/relay"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      docker-images:
        patterns: ["*"]
